#jobs:
#  sync:
#   runs-on: ubuntu-latest

#    steps:
#      - uses: actions/checkout@v4
#        with:
#          fetch-depth: 2  # Need HEAD~1 for diff

      # Skip if this is a writeback commit
#      - name: Check for skip marker
#        id: check-skip
#        run: |
#          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q '\[skip-sync\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping sync — writeback commit detected"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check-skip.outputs.skip == 'false'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check-skip.outputs.skip == 'false'
        run: npm ci

      # Determine which files changed
      - name: Compute changed files
        if: steps.check-skip.outputs.skip == 'false' && github.event.inputs.full-sync != 'true'
        id: diff
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD~1..HEAD -- 'docs/**/*.md' | tr '\n' ',')
          DELETED=$(git diff --name-only --diff-filter=D HEAD~1..HEAD -- 'docs/**/*.md' | tr '\n' ',')
          echo "changed=${CHANGED%,}" >> "$GITHUB_OUTPUT"
          echo "deleted=${DELETED%,}" >> "$GITHUB_OUTPUT"
          echo "Changed: $CHANGED"
          echo "Deleted: $DELETED"

      # Run sync (diff-based)
      - name: Sync changed docs to Featurebase
        if: steps.check-skip.outputs.skip == 'false' && github.event.inputs.full-sync != 'true' && steps.diff.outputs.changed != ''
        env:
          FEATUREBASE_API_KEY: ${{ secrets.FEATUREBASE_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ steps.diff.outputs.changed }}" ]; then
            ARGS="$ARGS --files ${{ steps.diff.outputs.changed }}"
          fi
          if [ -n "${{ steps.diff.outputs.deleted }}" ]; then
            ARGS="$ARGS --deleted ${{ steps.diff.outputs.deleted }}"
          fi
          node scripts/sync-to-featurebase.mjs $ARGS

      # Run sync (full)
      - name: Full sync all docs to Featurebase
        if: steps.check-skip.outputs.skip == 'false' && github.event.inputs.full-sync == 'true'
        env:
          FEATUREBASE_API_KEY: ${{ secrets.FEATUREBASE_API_KEY }}
        run: node scripts/sync-to-featurebase.mjs --full-sync

      # Handle deleted files
      - name: Archive deleted docs in Featurebase
        if: steps.check-skip.outputs.skip == 'false' && github.event.inputs.full-sync != 'true' && steps.diff.outputs.deleted != ''
        env:
          FEATUREBASE_API_KEY: ${{ secrets.FEATUREBASE_API_KEY }}
        run: node scripts/sync-to-featurebase.mjs --deleted "${{ steps.diff.outputs.deleted }}"

      # Writeback featurebaseId for newly created articles
      - name: Create writeback PR
        if: steps.check-skip.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f .writeback-files ]; then
            echo "No new articles — no writeback needed"
            exit 0
          fi

          BRANCH="chore/featurebase-id-writeback-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Stage only the files that got new IDs
          while IFS= read -r file; do
            git add "$file"
          done < .writeback-files

          git commit -m "chore: add featurebaseId to new articles [skip-sync]"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: featurebaseId writeback" \
            --body "Automated: adds featurebaseId frontmatter to newly created articles." \
            --base main \
            --head "$BRANCH"

          gh pr merge "$BRANCH" --auto --squash

          # Clean up temp file
          rm -f .writeback-files
